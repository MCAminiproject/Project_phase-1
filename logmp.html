<!DOCTYPE html>
<html>

<head>
    <title>Recipe Rush - Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
        }

        .navbar {
            color: white;
            text-decoration: none;
            background-color: #da813d;
            padding: 2px;

            display: flex;
            justify-content: space-between;

        }

            text-decoration: none;

        }
        .login-box:hover{

        .login-box{

            height: 320px;

            padding: 20px;
            border-radius: 5px;
            box-shadow: 0px 0px 8px gray;
        }

        h2 {
            text-align: center;
        }
        input {
            width: 300px;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        input[type=text],
        input[type=password] {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        input[type=submit] {
            width: 100%;
            padding: 10px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        input[type=submit]:hover {

        }

        p {
            text-align: center;
        }

</head>

<div class="navbar">
